<div class="container">
    <h1>📊 Generar Archivos Estadística</h1>
    <form action="/util/crear-archivos" method="post">
        <fieldset>
            <legend>Configuración</legend>
            <label>Tipo de archivo:</label>
            <select name="tipo" required>
                <option value="1">Artículos Científicos (385 registros, escala Likert 1-5)</option>
                <option value="2">Estudios de Caso (Pre-test / Post-test por dimensiones)</option>
            </select>

            <label>Cantidad de archivos (máx. 50):</label>
            <input type="number" name="cantidad" min="1" max="50" value="1" required>
            <span class="help-text">Recibirás un ZIP con todos los archivos Excel generados con datos aleatorios.</span>
        </fieldset>
        <button type="submit" class="submit-btn">⬇️ Descargar ZIP</button>
    </form>
</div>
