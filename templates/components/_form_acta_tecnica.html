<div class="container" style="max-width:900px;">
    <h1>📝 Acta Técnica con IA</h1>

    <form action="{{ url_for('actas.generar_acta_tecnica') }}" method="POST" enctype="multipart/form-data">

        <!-- 1. Información General -->
        <fieldset>
            <legend>1. Información General</legend>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div>
                    <label>N° Acta:</label>
                    <input type="text" name="num_acta" placeholder="Ej: DCPLL-004-2025" required>
                </div>
                <div>
                    <label>Fecha:</label>
                    <input type="date" name="fecha_reunion" required>
                </div>
                <div>
                    <label>Lugar:</label>
                    <input type="text" name="lugar_reunion" placeholder="Ej: Aula 102" required>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                    <div>
                        <label>Hora inicio:</label>
                        <input type="time" name="hora_inicio" required>
                    </div>
                    <div>
                        <label>Hora fin:</label>
                        <input type="time" name="hora_fin" required>
                    </div>
                </div>
                <div style="grid-column:1/-1;">
                    <label>Convocado por (Nombre, Cargo):</label>
                    <input type="text" name="convocante"
                           placeholder="Ej: Mg. López, Director de Carrera" required>
                </div>
            </div>
        </fieldset>

        <!-- 2. Participantes / Firmantes -->
        <fieldset>
            <legend>2. Participantes (aparecerán como firmantes)</legend>
            <div id="lista-participantes">
                <div class="participante-row"
                     style="display:grid;grid-template-columns:80px 1fr 1fr 1fr;gap:8px;margin-bottom:8px;">
                    <input type="text" name="p_titulo[]"  placeholder="Título" style="width:100%;">
                    <input type="text" name="p_nombre[]"  placeholder="Nombre"   required>
                    <input type="text" name="p_apellido[]" placeholder="Apellido" required>
                    <input type="text" name="p_cargo[]"   placeholder="Cargo" value="Docente">
                </div>
            </div>
            <button type="button" id="add-participante" class="submit-btn"
                style="background:#e2e8f0;color:#1e293b;margin-top:8px;font-size:0.85em;padding:8px 16px;width:auto;">
                + Añadir Participante
            </button>
        </fieldset>

        <!-- 3. Elaborado por -->
        <fieldset>
            <legend>3. Elaborado por</legend>
            <div style="display:grid;grid-template-columns:100px 1fr;gap:12px;">
                <div>
                    <label>Título:</label>
                    <input type="text" name="elaborado_titulo" placeholder="Ej: Lic." required>
                </div>
                <div>
                    <label>Nombre completo:</label>
                    <input type="text" name="elaborado_nombre"
                           placeholder="Ej: Yasmín Bermúdez Velasco" required>
                </div>
            </div>
        </fieldset>

        <!-- 4. Notas para la IA -->
        <fieldset>
            <legend>4. Notas para la IA</legend>

            <!-- Toggle manual / audio -->
            <div style="display:flex;gap:8px;margin-bottom:16px;">
                <button type="button" id="btn-modo-manual"
                    onclick="setModoNotas('manual')"
                    style="padding:8px 18px;border-radius:6px;border:2px solid #6366f1;
                           background:#6366f1;color:#fff;font-weight:600;cursor:pointer;">
                    ✍️ Escribir manualmente
                </button>
                <button type="button" id="btn-modo-audio"
                    onclick="setModoNotas('audio')"
                    style="padding:8px 18px;border-radius:6px;border:2px solid #6366f1;
                           background:#fff;color:#6366f1;font-weight:600;cursor:pointer;">
                    🎙️ Desde grabación
                </button>
            </div>

            <!-- Panel: subir audio -->
            <div id="panel-audio-notas" style="display:none;margin-bottom:16px;
                 background:#f0f9ff;border-left:4px solid #0ea5e9;
                 padding:14px 16px;border-radius:6px;">
                <label style="font-weight:600;color:#0c4a6e;">Archivo de audio de la reunión:</label>
                <input type="file" id="audio_acta_file"
                       accept=".mp3,.mp4,.m4a,.wav,.ogg,.webm,.flac"
                       onchange="mostrarNombreAudioActa(this)"
                       style="margin-top:6px;">
                <span id="audio-acta-nombre" class="help-text">
                    Formatos: mp3, mp4, m4a, wav, ogg, webm, flac
                </span>
                <div style="margin-top:10px;">
                    <button type="button" id="btn-extraer-audio"
                        onclick="extraerNotasDesdeAudio()"
                        style="padding:8px 20px;background:#0ea5e9;color:#fff;border:none;
                               border-radius:6px;font-weight:600;cursor:pointer;">
                        🤖 Extraer notas con IA
                    </button>
                    <span id="audio-acta-estado" style="margin-left:12px;font-size:0.85em;color:#64748b;"></span>
                </div>
            </div>

            <!-- Textareas (siempre presentes, editables) -->
            <div style="display:flex;flex-direction:column;gap:12px;">
                <div>
                    <label>Puntos del orden del día:</label>
                    <textarea id="notas_aspectos" name="notas_aspectos" rows="3"
                        placeholder="Ej: Revisión de sílabos, planificación de recuperación, reporte de asistencia" required></textarea>
                </div>
                <div>
                    <label>¿Qué sucedió en la reunión? (resumen breve):</label>
                    <textarea id="notas_reunion" name="notas_reunion" rows="4"
                        placeholder="Ej: Se revisaron los sílabos de cada docente. Se discutió el cronograma de recuperación..." required></textarea>
                </div>
                <div>
                    <label>Acuerdos y compromisos finales:</label>
                    <textarea id="notas_compromisos" name="notas_compromisos" rows="3"
                        placeholder="Ej: Entregar sílabos corregidos antes del viernes, publicar cronograma en plataforma" required></textarea>
                </div>
            </div>
        </fieldset>

        <!-- 5. Evidencias fotográficas -->
        <fieldset>
            <legend>5. Evidencias fotográficas (opcional)</legend>
            <span class="help-text">Podés subir varias fotos — se insertarán en la sección de evidencias del acta.</span>
            <input type="file" name="fotos_evidencia" accept="image/*" multiple
                   onchange="listarArchivos(this, 'lista-fotos', '📷')"
                   style="margin-top:8px;">
            <div id="lista-fotos" style="margin-top:8px;"></div>
        </fieldset>

        <button type="submit" class="submit-btn">🤖 Generar Acta con IA</button>
    </form>
</div>

<script>
// ── Modo de notas: manual / audio ───────────────────────────────────────────
function setModoNotas(modo) {
    const panelAudio = document.getElementById('panel-audio-notas');
    const btnManual  = document.getElementById('btn-modo-manual');
    const btnAudio   = document.getElementById('btn-modo-audio');

    if (modo === 'audio') {
        panelAudio.style.display = 'block';
        btnAudio.style.background  = '#6366f1';
        btnAudio.style.color       = '#fff';
        btnManual.style.background = '#fff';
        btnManual.style.color      = '#6366f1';
    } else {
        panelAudio.style.display = 'none';
        btnManual.style.background = '#6366f1';
        btnManual.style.color      = '#fff';
        btnAudio.style.background  = '#fff';
        btnAudio.style.color       = '#6366f1';
    }
}

function mostrarNombreAudioActa(input) {
    const span = document.getElementById('audio-acta-nombre');
    if (input.files.length && span) {
        const name = input.files[0].name;
        const size = (input.files[0].size / 1024 / 1024).toFixed(1);
        span.textContent = `✅ ${name} (${size} MB)`;
    }
}

function extraerNotasDesdeAudio() {
    const fileInput = document.getElementById('audio_acta_file');
    const estado    = document.getElementById('audio-acta-estado');
    const btn       = document.getElementById('btn-extraer-audio');

    if (!fileInput.files.length) {
        estado.textContent = '⚠️ Seleccioná un archivo de audio primero.';
        estado.style.color = '#dc2626';
        return;
    }

    btn.disabled       = true;
    btn.textContent    = '⏳ Procesando...';
    estado.textContent = 'Enviando audio a AssemblyAI...';
    estado.style.color = '#64748b';

    const fd = new FormData();
    fd.append('audio_acta', fileInput.files[0]);

    // ── Paso 1: Submit ────────────────────────────────────────────────────────
    fetch('/util/acta_extraer_audio/submit', { method: 'POST', body: fd })
        .then(async res => {
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Error al enviar el audio');
            return data.transcript_id;
        })
        .then(transcriptId => {
            estado.textContent = '⏳ Transcribiendo audio con IA...';
            // ── Paso 2: Poll status ───────────────────────────────────────────
            return esperarTranscriptActa(transcriptId);
        })
        .then(transcriptId => {
            estado.textContent = '⏳ Generando notas con LeMUR...';
            // ── Paso 3: Obtener resultado ─────────────────────────────────────
            return fetch(`/util/acta_extraer_audio/resultado/${transcriptId}`);
        })
        .then(async res => {
            if (!res.ok) {
                const data = await res.json().catch(() => ({ error: 'Error desconocido' }));
                throw new Error(data.error || 'Error al generar notas');
            }
            return res.json();
        })
        .then(data => {
            if (data.aspectos)    document.getElementById('notas_aspectos').value    = data.aspectos;
            if (data.desarrollo)  document.getElementById('notas_reunion').value     = data.desarrollo;
            if (data.compromisos) document.getElementById('notas_compromisos').value = data.compromisos;
            estado.textContent = '✅ Notas extraídas. Podés editarlas antes de generar el acta.';
            estado.style.color = '#16a34a';
        })
        .catch(err => {
            estado.textContent = `❌ ${err.message}`;
            estado.style.color = '#dc2626';
        })
        .finally(() => {
            btn.disabled    = false;
            btn.textContent = '🤖 Extraer notas con IA';
        });
}

function esperarTranscriptActa(transcriptId) {
    return new Promise((resolve, reject) => {
        const intervalo = setInterval(() => {
            fetch(`/util/acta_extraer_audio/status/${transcriptId}`)
                .then(r => r.json())
                .then(data => {
                    if (data.error && !data.status) {
                        clearInterval(intervalo);
                        reject(new Error(data.error));
                    } else if (data.status === 'completed') {
                        clearInterval(intervalo);
                        resolve(transcriptId);
                    } else if (data.status === 'error') {
                        clearInterval(intervalo);
                        reject(new Error(data.error || 'Error en la transcripción'));
                    }
                })
                .catch(err => {
                    clearInterval(intervalo);
                    reject(err);
                });
        }, 5000);
    });
}

// ── Add participante ─────────────────────────────────────────────────────────
document.getElementById('add-participante').addEventListener('click', function() {
    const lista = document.getElementById('lista-participantes');
    const fila  = document.createElement('div');
    fila.className = 'participante-row';
    fila.style.cssText = 'display:grid;grid-template-columns:80px 1fr 1fr 1fr;gap:8px;margin-bottom:8px;';
    fila.innerHTML = `
        <input type="text" name="p_titulo[]"   placeholder="Título"   style="width:100%;">
        <input type="text" name="p_nombre[]"   placeholder="Nombre"   required>
        <input type="text" name="p_apellido[]" placeholder="Apellido" required>
        <input type="text" name="p_cargo[]"    placeholder="Cargo" value="Docente">
        <button type="button" onclick="this.closest('.participante-row').remove()"
            style="grid-column:1/-1;background:#fee2e2;color:#991b1b;border:none;
                   border-radius:4px;padding:4px;cursor:pointer;font-size:0.8em;">
            ✕ Eliminar
        </button>`;
    lista.appendChild(fila);
});
</script>
