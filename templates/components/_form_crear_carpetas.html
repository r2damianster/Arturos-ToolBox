<div class="container">
    <h1>📂 Crear Carpetas</h1>
    <form action="/util/crear-carpetas" method="post">
        <fieldset>
            <legend>Lista de carpetas y subcarpetas</legend>
            <label>Escribe un nombre de carpeta por línea:</label>
            <textarea name="nombres" class="textarea-flexible"
                placeholder="Evaluaciones&#10;Evaluaciones/Parcial 1&#10;Evaluaciones/Parcial 2&#10;Recursos&#10;Recursos/Bibliografía&#10;Recursos/Multimedia" required></textarea>
            <span class="help-text">
                💡 <strong>Para crear subcarpetas:</strong> usa la sintaxis <code>carpeta/subcarpeta</code>.<br>
                Ejemplo: <code>Unidad 1/Lecciones</code> creará una subcarpeta "Lecciones" dentro de "Unidad 1".<br>
                Recibirás un ZIP con la estructura lista para descomprimir.
            </span>
        </fieldset>
        <button type="submit" class="submit-btn">⬇️ Descargar ZIP</button>
    </form>
</div>
