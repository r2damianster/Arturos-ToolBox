<div class="container">
    <h1>📂 Crear Carpetas</h1>
    <form action="/util/crear-carpetas" method="post">
        <fieldset>
            <legend>Lista de carpetas</legend>
            <label>Escribe un nombre de carpeta por línea:</label>
            <textarea name="nombres" class="textarea-flexible"
                placeholder="Unidad 1&#10;Unidad 2&#10;Recursos&#10;Evaluaciones" required></textarea>
            <span class="help-text">Recibirás un ZIP con la estructura de carpetas lista para descomprimir en tu equipo.</span>
        </fieldset>
        <button type="submit" class="submit-btn">⬇️ Descargar ZIP</button>
    </form>
</div>
