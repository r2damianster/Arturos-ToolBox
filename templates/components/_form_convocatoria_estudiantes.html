<div class="container" style="max-width:800px;">
    <h1>🎓 Convocatoria a Estudiantes</h1>

    <form action="{{ url_for('convocatorias.convocatoria_estudiante') }}" method="POST" enctype="multipart/form-data">
        <fieldset>
            <legend>Identificación</legend>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div>
                    <label>N.º Convocatoria:</label>
                    <input type="text" name="num_convocatoria" placeholder="Ej: 001" required>
                </div>
                <div>
                    <label>Periodo Académico:</label>
                    <select name="periodo" required>
                        <option value="" disabled selected>Seleccione...</option>
                        <option value="2026-1">2026-1</option>
                        <option value="2026-2">2026-2</option>
                    </select>
                </div>
                <div>
                    <label>Ciudad:</label>
                    <input type="text" name="ciudad" value="Manta" required>
                </div>
                <div>
                    <label>Fecha de Emisión:</label>
                    <input type="date" id="date_picker_est" onchange="convertirFechaLarga(this, 'fecha_larga_est')" required>
                    <input type="hidden" name="fecha_larga" id="fecha_larga_est">
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Datos del Evento</legend>

            <!-- Enriquecer asunto y descripción con IA -->
            <div style="margin-bottom:12px;padding:10px;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <button type="button" onclick="enriquecerConvEstudiantesIA()"
                        style="padding:6px 16px;background:#16a34a;color:#fff;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:0.85em;">
                        ✨ Enriquecer con IA
                    </button>
                    <span id="ia-conv-est-status" style="font-size:0.8rem;color:#64748b;"></span>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div style="grid-column:1/-1;">
                    <label>Asunto:</label>
                    <input type="text" name="asunto" required>
                </div>
                <div style="grid-column:1/-1;">
                    <label>Cursos / Niveles (Ctrl+Clic para seleccionar varios):</label>
                    <select name="cursos" id="cursos-multiple" multiple required style="height:130px;">
                        <option value="Primer Semestre 'A'">Primer Semestre 'A'</option>
                        <option value="Segundo Semestre 'A'">Segundo Semestre 'A'</option>
                        <option value="Tercer Semestre 'A'">Tercer Semestre 'A'</option>
                        <option value="Cuarto Semestre 'A'">Cuarto Semestre 'A'</option>
                        <option value="Cuarto Semestre 'B'">Cuarto Semestre 'B'</option>
                        <option value="Quinto Semestre 'A'">Quinto Semestre 'A'</option>
                        <option value="Sexto Semestre 'A'">Sexto Semestre 'A'</option>
                    </select>
                </div>
                <div style="grid-column:1/-1;">
                    <label>Descripción del motivo:</label>
                    <textarea name="descripcion_convocatoria" rows="3" required></textarea>
                </div>
                <div>
                    <label>Fecha de Reunión:</label>
                    <input type="date" name="fecha_reunion" required>
                </div>
                <div>
                    <label>Hora:</label>
                    <input type="time" name="hora_reunion" required>
                </div>
                <div style="grid-column:1/-1;">
                    <label>Lugar:</label>
                    <input type="text" name="lugar_reunion" required>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Archivos Excel (uno por curso)</legend>
            <div id="aviso-cursos" style="color:#dc2626;font-weight:600;margin-bottom:8px;display:none;">
                ⚠️ Suba un archivo Excel por cada curso seleccionado.
            </div>
            <input type="file" name="excel_files" id="excel_files"
                   accept=".xls,.xlsx,.ods" multiple required
                   onchange="actualizarListaArchivos()">
            <div id="lista-archivos-seleccionados"
                 style="margin-top:10px;padding:10px;border:1px dashed #cbd5e1;border-radius:6px;">
                <em>Ningún archivo seleccionado.</em>
            </div>
        </fieldset>

        <fieldset>
            <legend>Firma</legend>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div>
                    <label>Título:</label>
                    <input type="text" name="convocante_titulo" placeholder="Ej: Mg." required>
                </div>
                <div>
                    <label>Nombre completo:</label>
                    <input type="text" name="convocante_nombre" required>
                </div>
                <div>
                    <label>Cargo:</label>
                    <input type="text" name="convocante_cargo" required>
                </div>
                <div>
                    <label>Iniciales elaborador:</label>
                    <input type="text" name="iniciales_elaborador" placeholder="Ej: VVP/ddm" required>
                </div>
            </div>
        </fieldset>

        <button type="submit" class="submit-btn">📄 Generar Convocatoria Estudiantes</button>
    </form>
</div>

<script>
// ── Enriquecer con IA (Convocatoria Estudiantes) ──
function enriquecerConvEstudiantesIA() {
    const asunto = document.querySelector('input[name="asunto"]').value;
    const desc = document.querySelector('textarea[name="descripcion_convocatoria"]').value;
    const statusEl = document.getElementById('ia-conv-est-status');

    if (!asunto && !desc) {
        statusEl.textContent = '⚠️ Escribe algo primero.';
        statusEl.style.color = '#dc2626';
        return;
    }

    statusEl.textContent = '⏳ Procesando...';
    statusEl.style.color = '#64748b';

    const calls = [];
    if (asunto && asunto.trim().length >= 3) {
        calls.push(fetch('/util/ia_enriquecer', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contexto: 'convocatoria_asunto', texto: asunto })
        }).then(async r => {
            const d = await r.json();
            if (!r.ok) throw new Error(d.cooldown_formatted ? `Espera ${d.cooldown_formatted}` : d.error);
            return { field: 'asunto', texto: d.texto_enriquecido };
        }));
    }
    if (desc && desc.trim().length >= 3) {
        calls.push(fetch('/util/ia_enriquecer', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contexto: 'convocatoria_descripcion', texto: desc })
        }).then(async r => {
            const d = await r.json();
            if (!r.ok) throw new Error(d.cooldown_formatted ? `Espera ${d.cooldown_formatted}` : d.error);
            return { field: 'descripcion_convocatoria', texto: d.texto_enriquecido };
        }));
    }

    Promise.all(calls)
        .then(results => {
            results.forEach(r => {
                if (r.field === 'asunto')
                    document.querySelector('input[name="asunto"]').value = r.texto;
                else
                    document.querySelector('textarea[name="descripcion_convocatoria"]').value = r.texto;
            });
            statusEl.textContent = '✅ Enriquecido. Podés editar.';
            statusEl.style.color = '#16a34a';
        })
        .catch(err => {
            statusEl.textContent = `❌ ${err.message}`;
            statusEl.style.color = '#dc2626';
        });
}
</script>
